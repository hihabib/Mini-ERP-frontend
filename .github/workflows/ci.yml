name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    name: Lint, Typecheck, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests with coverage
        run: pnpm run test:coverage

      # ── E2E tests ────────────────────────────────────────────────────────────
      # NOTE: E2E tests require the backend API to be running at VITE_API_BASE_URL.
      # The backend lives in a separate repository and requires its own Docker
      # Compose stack (MongoDB + Node API). Wiring cross-repo services into this
      # CI workflow is currently a known gap — E2E tests are run locally by
      # developers before merging. To enable E2E in CI, add a step that checks out
      # the backend repo, runs `docker compose up -d`, waits for the health check,
      # then runs the Playwright suite below. Until then this step is intentionally
      # commented out rather than silently omitted.
      #
      # - name: Install Playwright browsers
      #   run: pnpm exec playwright install --with-deps chromium
      #
      # - name: E2E tests
      #   run: pnpm run test:e2e
      #   env:
      #     VITE_API_BASE_URL: http://localhost:8000/api
      #     VITE_SOCKET_URL: http://localhost:8000
